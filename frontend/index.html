<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notie — AI 회의록 도우미</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
  </head>
  <body>
    <script>
      ;(() => {
        try {
          const value = window.localStorage.getItem('notie_font_size')
          const allowed = ['very-small', 'small', 'normal', 'large', 'very-large']
          if (allowed.includes(value)) {
            document.documentElement.dataset.notieFontSize = value
          }
        } catch {
          // Ignore storage errors and keep the default font size.
        }
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
